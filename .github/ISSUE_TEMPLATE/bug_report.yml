name: Bug report
description: Report a reproducible defect
title: "bug: "
labels:
  - bug
  - needs-triage
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide complete reproduction details.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: sessions monitor returns 500 for instance=2
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact sequence to reproduce the issue.
      placeholder: |
        1. Start server with ...
        2. Open ...
        3. Call ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version (if applicable).
      placeholder: Windows 11, Python 3.12, Docker Desktop 27.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and traces
      description: Paste relevant logs without secrets.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmation
      options:
        - label: I confirmed this issue is not already reported.
          required: true
        - label: I removed secrets from logs and screenshots.
          required: true
