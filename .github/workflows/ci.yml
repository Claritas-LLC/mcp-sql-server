name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check mcp_sqlserver

      - name: Syntax check
        run: python -m py_compile mcp_sqlserver/server.py

      - name: Tests
        shell: bash
        run: |
          if [ -d tests ] && [ -n "$(find tests -type f -name '*.py' -print -quit)" ]; then
            PYTHONPATH=. pytest -q
          else
            echo "No tests detected; skipping pytest"
          fi

  docker-build-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mcp-sql-server:ci .
